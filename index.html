<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>管理アプリ</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <h1>管理アプリ</h1>

  <!-- ログイン -->
  <button id="loginButton">
    Googleログイン
  </button>

  <div id="userInfo"></div>

  <!-- ファイル・フォルダ -->
  <div class="file-controls">

    <!-- フォルダ -->
    <select id="folderSelect"></select>

    <button id="newFolderButton">
      ＋ フォルダ追加
    </button>

    <!-- ファイル -->
    <select id="fileSelect"></select>

    <button id="newFileButton">
      ＋ 新規ファイル
    </button>

    <button id="deleteFileButton">
      － ファイル削除
    </button>

  </div>

  <!-- 操作 -->
  <div class="controls">

    <button id="addRowButton">
      ＋ 項目追加
    </button>

    <button id="deleteRowButton">
      － 行削除
    </button>

    <button id="addColumnButton">
      ＋ 列追加
    </button>

    <button id="deleteColumnButton">
      － 列削除
    </button>

    <button id="saveButton">
      保存
    </button>

  </div>

  <!-- テーブル -->
  <div id="tableContainer"></div>

  <!-- Firebase -->
  <script
    type="module"
    src="js/firebase.js"
  ></script>

  <!-- JS -->
  <script src="js/storage.js"></script>

  <script src="js/suggestion.js"></script>

  <script src="js/table.js"></script>

  <script src="js/app.js"></script>

</body>

</html>
