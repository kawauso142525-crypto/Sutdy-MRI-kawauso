<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>管理アプリ</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <h1>管理アプリ</h1>

  <div class="file-controls">

    <select id="fileSelect"></select>

    <button id="newFileButton">
      ＋ 新規ファイル
    </button>

    <button id="deleteFileButton">
      -ファイル削除
    </button>

  </div>

  <div class="controls">

    <button id="addRowButton">
      ＋ 項目追加
    </button>

    <button id="addColumnButton">
      ＋ 列追加
    </button>

    <button id="saveButton">
      保存
    </button>

    <button id="exportButton">
      JSON出力
    </button>

    <input
      type="file"
      id="importInput"
      accept=".json"
    >

  </div>

  <script type="module" src="js/firebase.js"></script>

  <script src="js/storage.js"></script>
  <script src="js/suggestion.js"></script>
  <script src="js/table.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
