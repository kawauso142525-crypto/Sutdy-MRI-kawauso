<!DOCTYPE html>
<html lang="ja">

<head>

  <meta
    name="viewport"

  />

  <title>
    Table Manager
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  ========================== -->

      ←
    </button>

    <div id="title">
      Table Manager
    </div>

    <button id="actionBtn">

  </div>

  <!-- =========================

  ========================== -->
  <div id="folderView">
  </div>

  <!-- =========================

  ========================== -->

    <div id="tableContainer">
    </div>

  </div>

  <!-- =========================

  <script

  ></script>

  <!-- STORAGE -->
  <script src="storage.js"></script>

  <script src="suggestion.js"></script>

  <script src="table.js"></script>

  <script src="app.js"></script>

</html>
